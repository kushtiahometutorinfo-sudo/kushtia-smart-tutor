<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Kushtia Smart Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@600;700;800&family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-900:#0E3B22; --green-700:#1B7A3D; --green-600:#219653; --green-500:#2FA85A; --green-lime:#7ED957;
    --mint-50:#EFFAF3; --mint-100:#DFF3E6; --ink:#0F2318; --ink-soft:#43594C; --paper:#FCFDFB; --line:#D8ECDF;
    --red-500:#E24C4C;
    --shadow:0 20px 45px -22px rgba(14,59,34,.35); --shadow-lg:0 30px 60px -28px rgba(14,59,34,.45);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;font-family:'Hind Siliguri','Poppins',sans-serif;
    background:linear-gradient(160deg,var(--mint-50),var(--paper) 60%);
    color:var(--ink);display:flex;flex-direction:column;
  }
  .bn{font-family:'Hind Siliguri',sans-serif;} .en{font-family:'Poppins',sans-serif;}
  a{color:inherit;text-decoration:none;}

  .topbar{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(155deg,var(--green-600),var(--green-900));display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  .brand-mark svg{width:22px;height:22px;}
  .brand-text .en{font-weight:700;font-size:16px;color:var(--green-900);}
  .brand-text .tag{font-size:10px;color:var(--ink-soft);}

  .return-home{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-soft);}
  .return-home:hover{color:var(--green-700);}

  .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 18px 60px;}
  .card{
    width:100%;max-width:420px;background:#fff;border:1px solid var(--line);
    border-radius:24px;box-shadow:var(--shadow-lg);padding:36px 30px 30px;
    animation:rise .5s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  .logo-badge{width:56px;height:56px;border-radius:16px;margin:0 auto 16px;background:linear-gradient(155deg,var(--green-600),var(--green-900));display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  .logo-badge svg{width:30px;height:30px;}

  h1.title{font-size:23px;margin:0 0 6px;font-weight:700;text-align:center;font-family:'Baloo Da 2','Hind Siliguri',sans-serif;color:var(--green-900);}
  p.subtitle{margin:0 0 26px;color:var(--ink-soft);font-size:14px;line-height:1.7;text-align:center;}

  label{display:block;font-size:13.5px;font-weight:600;color:var(--ink);margin:14px 0 6px;}
  .label-row{display:flex;justify-content:space-between;align-items:center;margin:14px 0 6px;}
  .label-row label{margin:0;}
  .forgot-link{font-size:12.5px;font-weight:700;color:var(--green-700);}
  .forgot-link:hover{text-decoration:underline;}

  input[type=text],input[type=password]{
    width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);
    font-size:15px;font-family:inherit;outline:none;transition:border-color .2s ease,box-shadow .2s ease;
    background:var(--paper);
  }
  input:focus{border-color:var(--green-500);box-shadow:0 0 0 4px rgba(47,168,90,.15);}

  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:44px;}
  .pw-toggle{
    position:absolute;right:6px;top:50%;transform:translateY(-50%);
    width:34px;height:34px;border:none;background:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--ink-soft);
  }
  .pw-toggle:hover{background:var(--mint-100);color:var(--green-700);}

  .btn{
    width:100%;margin-top:22px;padding:14px 20px;border-radius:14px;border:none;
    font-size:15.5px;font-weight:700;color:#fff;font-family:'Hind Siliguri',sans-serif;
    background:linear-gradient(135deg,var(--green-600),var(--green-900));
    box-shadow:0 14px 26px -12px rgba(15,59,34,.55);
    display:flex;align-items:center;justify-content:center;gap:8px;
    position:relative;overflow:hidden;transition:transform .2s ease,filter .2s ease;cursor:pointer;
  }
  .btn::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);transform:translateX(-120%);}
  .btn:hover::before{transform:translateX(120%);transition:transform .8s ease;}
  .btn:hover{filter:brightness(1.06);transform:translateY(-2px);}
  .btn:disabled{opacity:.55;cursor:not-allowed;filter:none;transform:none;}
  .btn .spinner{width:16px;height:16px;border-radius:50%;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;animation:spin .7s linear infinite;display:none;}
  .btn.loading .spinner{display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .error-msg{
    background:#FDECEC;color:var(--red-500);border:1px solid #F6C6C6;
    padding:10px 14px;border-radius:10px;font-size:13.5px;margin-top:14px;
    display:none;
  }
  .error-msg.show{display:block;animation:shake .35s ease;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

  .trust-badge{
    display:flex;align-items:center;justify-content:center;gap:7px;margin-top:20px;
    color:var(--ink-soft);font-size:12px;
  }
  .trust-badge svg{width:14px;height:14px;flex-shrink:0;}

  .divider{height:1px;background:var(--line);margin:22px 0 16px;}

  .switch-row{text-align:center;font-size:13.5px;color:var(--ink-soft);}
  .switch-row a{color:var(--green-700);font-weight:700;}
  .switch-row a:hover{text-decoration:underline;}

  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;}}
</style>
</head>
<body>

<div class="topbar">
  <a href="home.html" class="return-home bn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    হোমে ফিরুন
  </a>
  <a href="home.html" class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3L20 9.5V20a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1V9.5L12 3Z" fill="#EFFAF3"/></svg>
    </div>
    <div class="brand-text">
      <div class="en">Kushtia Smart Tutor</div>
      <div class="tag bn">আপনার হোম লার্নিং পার্টনার</div>
    </div>
  </a>
</div>

<div class="wrap">
  <div class="card">

    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3L20 9.5V20a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1V9.5L12 3Z" fill="#EFFAF3"/></svg>
    </div>
    <h1 class="title en">Admin Login</h1>
    <p class="subtitle bn">অ্যাডমিন প্যানেলে প্রবেশ করতে লগইন করুন</p>

    <label class="bn" for="emailInput">ইমেইল</label>
    <input type="email" id="emailInput" placeholder="admin@example.com" autocomplete="username">

    <label class="bn" for="passwordInput" style="margin:14px 0 6px;">পাসওয়ার্ড</label>
    <div class="pw-wrap">
      <input type="password" id="passwordInput" placeholder="আপনার পাসওয়ার্ড" autocomplete="current-password">
      <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
        <svg id="eyeIcon" width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/></svg>
      </button>
    </div>

    <div class="error-msg bn" id="loginErr"></div>

    <button class="btn bn" id="loginBtn">
      <span class="spinner"></span><span class="btn-label">Log In to Admin Panel →</span>
    </button>

    <div class="trust-badge bn">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 4 5.5v6c0 5 3.4 8.9 8 10 4.6-1.1 8-5 8-10v-6L12 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M9.5 12.2l1.8 1.8 3.2-3.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Secure encrypted session
    </div>

  </div>
</div>

<script>
  // ⚠️ Update this once your Cloudflare Worker is deployed:
  const API_BASE = "https://kushtia-smart-tutor-auth.kushtia-smart-tutor.workers.dev";

  // ---------- password show/hide ----------
  const pwInput = document.getElementById("passwordInput");
  const pwToggle = document.getElementById("pwToggle");
  const eyeIcon = document.getElementById("eyeIcon");
  const EYE_OPEN = `<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/>`;
  const EYE_CLOSED = `<path d="M3 3l18 18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M10.6 5.2A11.6 11.6 0 0 1 12 5c7 0 11 7 11 7a14.6 14.6 0 0 1-3.3 3.9M6.5 6.6C3.4 8.6 1 12 1 12s4 7 11 7c1.3 0 2.5-.2 3.6-.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.9 10a3 3 0 0 0 4.1 4.1" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>`;
  pwToggle.addEventListener("click", () => {
    const showing = pwInput.type === "text";
    pwInput.type = showing ? "password" : "text";
    eyeIcon.innerHTML = showing ? EYE_OPEN : EYE_CLOSED;
    pwToggle.setAttribute("aria-label", showing ? "Show password" : "Hide password");
  });

  function showError(id, msg){
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.add("show");
  }
  function clearError(id){ document.getElementById(id).classList.remove("show"); }
  function setLoading(btn, loading){
    btn.disabled = loading;
    btn.classList.toggle("loading", loading);
  }

  // ---------- admin login ----------
  const loginBtn = document.getElementById("loginBtn");
  loginBtn.addEventListener("click", async () => {
    clearError("loginErr");
    const email = document.getElementById("emailInput").value.trim();
    const password = pwInput.value;

    if(!email){ showError("loginErr", "ইমেইল দিন"); return; }
    if(!password){ showError("loginErr", "পাসওয়ার্ড দিন"); return; }

    setLoading(loginBtn, true);
    try{
      // /api/admin-login accepts { email, password } and returns a signed
      // admin session token used as "Authorization: Bearer <token>" on
      // every /api/admin/* call from admin-panel.html.
      const res = await fetch(`${API_BASE}/api/admin-login`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || "লগইন করা যায়নি");

      localStorage.setItem("kst_admin_token", data.token);
      localStorage.setItem("kst_admin", JSON.stringify(data.admin));
      window.location.href = "admin-panel.html";
    }catch(err){
      showError("loginErr", err.message);
    }finally{
      setLoading(loginBtn, false);
    }
  });

  pwInput.addEventListener("keydown", (e) => { if(e.key === "Enter") loginBtn.click(); });
</script>

</body>
</html>
