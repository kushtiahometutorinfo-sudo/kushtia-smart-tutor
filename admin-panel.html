<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Kushtia Smart Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@600;700;800&family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-900:#0E3B22; --green-700:#1B7A3D; --green-600:#219653; --green-500:#2FA85A; --green-lime:#7ED957;
    --mint-50:#EFFAF3; --mint-100:#DFF3E6; --ink:#0F2318; --ink-soft:#43594C; --paper:#FCFDFB; --line:#D8ECDF;
    --red-500:#E24C4C; --red-50:#FDECEC; --red-line:#F6C6C6;
    --orange-500:#F2994A; --orange-50:#FFF3E0; --orange-line:#FBD9A0;
    --shadow:0 20px 45px -22px rgba(14,59,34,.35); --shadow-lg:0 30px 60px -28px rgba(14,59,34,.45);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;font-family:'Hind Siliguri','Poppins',sans-serif;
    background:linear-gradient(160deg,var(--mint-50),var(--paper) 60%);
    color:var(--ink);
  }
  .bn{font-family:'Hind Siliguri',sans-serif;} .en{font-family:'Poppins',sans-serif;}
  a{color:inherit;text-decoration:none;}

  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:16px 24px;background:#fff;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:10;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(155deg,var(--green-600),var(--green-900));display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  .brand-mark svg{width:20px;height:20px;}
  .brand-text .en{font-weight:700;font-size:15px;color:var(--green-900);}
  .brand-text .tag{font-size:10px;color:var(--ink-soft);}

  .topbar-right{display:flex;align-items:center;gap:14px;}
  .admin-email{font-size:13px;color:var(--ink-soft);}
  .logout-btn{
    padding:9px 16px;border-radius:10px;border:1.5px solid var(--line);background:#fff;
    font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:'Hind Siliguri',sans-serif;
    transition:border-color .2s ease,color .2s ease;
  }
  .logout-btn:hover{border-color:var(--red-500);color:var(--red-500);}

  .refresh-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:9px 16px;border-radius:10px;border:1.5px solid var(--line);background:#fff;
    font-size:13px;font-weight:700;color:var(--green-700,#1f8a4d);cursor:pointer;font-family:'Hind Siliguri',sans-serif;
    transition:border-color .2s ease,background .2s ease,transform .15s ease;
  }
  .refresh-btn:hover{border-color:var(--green-600,#2ea44f);background:#f3fbf5;}
  .refresh-btn:active{transform:scale(0.96);}
  .refresh-btn svg{width:15px;height:15px;transition:transform .5s ease;}
  .refresh-btn.spinning svg{animation:spin .7s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  .tabs{display:flex;gap:8px;max-width:900px;margin:24px auto 0;padding:0 20px;}
  .tab-btn{
    padding:10px 18px;border-radius:12px;border:1.5px solid var(--line);background:#fff;
    font-size:13.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:'Hind Siliguri',sans-serif;
    display:flex;align-items:center;gap:8px;transition:all .2s ease;
  }
  .tab-btn.active{background:var(--green-900);color:#fff;border-color:var(--green-900);}
  .tab-badge{background:rgba(0,0,0,.15);padding:2px 8px;border-radius:999px;font-size:11.5px;}
  .tab-btn:not(.active) .tab-badge{background:var(--mint-100);color:var(--green-700);}

  .wrap{max-width:900px;margin:0 auto;padding:20px 20px 60px;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  h1.page-title{font-size:22px;margin:0 0 4px;font-weight:700;font-family:'Baloo Da 2','Hind Siliguri',sans-serif;color:var(--green-900);}
  p.page-sub{margin:0;color:var(--ink-soft);font-size:13.5px;}
  .count-pill{background:var(--mint-100);color:var(--green-700);font-weight:700;font-size:13px;padding:6px 14px;border-radius:999px;}
  .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green-500);margin-right:6px;animation:pulse 1.6s ease infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .empty-state svg{margin-bottom:14px;opacity:.55;}
  .empty-state p{font-size:14px;margin:0;}

  .req-list{display:flex;flex-direction:column;gap:14px;}
  .req-card{
    background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px 22px;
    box-shadow:var(--shadow);animation:rise .4s cubic-bezier(.2,.8,.2,1);
    transition:transform .35s ease,opacity .35s ease,max-height .35s ease,padding .35s ease,margin .35s ease;
  }
  .req-card.new-highlight{border-color:var(--green-500);box-shadow:0 0 0 4px rgba(47,168,90,.18),var(--shadow);}
  .req-card.removing{opacity:0;transform:scale(.96) translateY(-6px);max-height:0;padding-top:0;padding-bottom:0;margin:0;overflow:hidden;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .req-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}
  .req-name{font-size:16.5px;font-weight:700;color:var(--ink);}
  .req-role-badge{
    display:inline-flex;align-items:center;gap:5px;background:var(--mint-100);color:var(--green-700);
    font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;margin-left:8px;vertical-align:middle;
  }
  .req-role-badge.pay{background:var(--orange-50);color:#B05B00;}
  .req-meta{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
  .req-time{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;}

  .req-info-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;
    margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);
  }
  .req-info-item .k{font-size:11px;color:var(--ink-soft);font-weight:600;margin-bottom:2px;}
  .req-info-item .v{font-size:13.5px;font-weight:600;color:var(--ink);}
  .req-info-item .v.amount{color:var(--green-700);font-size:16px;font-family:'Baloo Da 2',sans-serif;}
  .req-info-item .v.mono{font-family:'Poppins',monospace;letter-spacing:.5px;}
  .req-photo{width:56px;height:56px;border-radius:12px;object-fit:cover;border:1.5px solid var(--line);flex-shrink:0;}

  .req-actions{display:flex;gap:10px;margin-top:16px;}
  .act-btn{
    flex:1;padding:11px 14px;border-radius:11px;border:none;font-size:13.5px;font-weight:700;
    cursor:pointer;font-family:'Hind Siliguri',sans-serif;transition:filter .2s ease,transform .2s ease;
  }
  .act-btn:hover{transform:translateY(-1px);}
  .act-btn.approve{background:linear-gradient(135deg,var(--green-600),var(--green-900));color:#fff;box-shadow:0 10px 20px -10px rgba(15,59,34,.55);}
  .act-btn.reject{background:var(--red-50);color:var(--red-500);border:1.5px solid var(--red-line);}
  .act-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .reject-note-row{display:none;margin-top:12px;gap:8px;}
  .reject-note-row.show{display:flex;}
  .reject-note-row input{
    flex:1;padding:10px 12px;border-radius:10px;border:1.5px solid var(--line);font-size:13px;
    font-family:inherit;outline:none;background:var(--paper);
  }
  .reject-note-row input:focus{border-color:var(--red-500);}
  .reject-note-row button{
    padding:10px 16px;border-radius:10px;border:none;background:var(--red-500);color:#fff;
    font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;
  }

  .card-error{
    margin-top:10px;background:var(--red-50);color:var(--red-500);border:1px solid var(--red-line);
    padding:8px 12px;border-radius:9px;font-size:12.5px;display:none;
  }
  .card-error.show{display:block;}

  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;}}
</style>
</head>
<body>

<div class="topbar">
  <a href="home.html" class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3L20 9.5V20a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1V9.5L12 3Z" fill="#EFFAF3"/></svg>
    </div>
    <div class="brand-text">
      <div class="en">Kushtia Smart Tutor</div>
      <div class="tag bn">Admin Panel</div>
    </div>
  </a>
  <div class="topbar-right">
    <span class="admin-email bn" id="adminEmailLabel"></span>
    <button class="logout-btn bn" id="logoutBtn">লগআউট</button>
  </div>
</div>

<div class="wrap">

  <!-- ================= AD REQUESTS (details + photo + payment, one card) ================= -->
  <div class="tab-panel active" id="panel-adreqs">
    <div class="page-head">
      <div>
        <h1 class="page-title en">Tutor Ad Requests</h1>
        <p class="page-sub bn">bKash/Nagad-এ মিলিয়ে দেখে Approve করুন · রিফ্রেশ বাটনে চাপুন নতুন রিকুয়েস্ট দেখতে</p>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="refresh-btn bn" id="refreshBtn" type="button" title="তালিকা রিফ্রেশ করুন">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          রিফ্রেশ
        </button>
        <span class="count-pill bn" id="adreqCountPill">0 পেন্ডিং</span>
      </div>
    </div>
    <div class="req-list" id="adreqReqList"></div>
    <div class="empty-state" id="adreqEmptyState">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#7ED957" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="10" stroke="#DFF3E6" stroke-width="1.5"/></svg>
      <p class="bn">এই মুহূর্তে কোনো পেন্ডিং অ্যাড রিকুয়েস্ট নেই।</p>
    </div>
  </div>

</div>

<script>
  // ⚠️ Update this once your Cloudflare Worker is deployed:
  const API_BASE = "https://kushtia-smart-tutor-auth.kushtia-smart-tutor.workers.dev";

  const token = localStorage.getItem("kst_admin_token");
  const adminRaw = localStorage.getItem("kst_admin");
  if(!token){
    window.location.href = "admin-login.html";
  }
  try{
    const admin = adminRaw ? JSON.parse(adminRaw) : null;
    document.getElementById("adminEmailLabel").textContent = admin && admin.email ? admin.email : "";
  }catch(e){}

  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("kst_admin_token");
    localStorage.removeItem("kst_admin");
    window.location.href = "admin-login.html";
  });

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
  }
  function fmtTime(ms){
    if(!ms) return "";
    const d = new Date(ms);
    return d.toLocaleString("bn-BD", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
  }
  async function callAdminAction(path, body){
    const res = await fetch(`${API_BASE}${path}`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify(body)
    });
    if(res.status === 401){
      localStorage.removeItem("kst_admin_token");
      localStorage.removeItem("kst_admin");
      window.location.href = "admin-login.html";
      throw new Error("Session শেষ হয়ে গেছে");
    }
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "সমস্যা হয়েছে");
    return data;
  }

  // ================= Generic poller factory =================
  // Builds an independent poll+render+animate cycle for one list
  // (tutor requests or payments), so both run side by side.
  function makeSection({ listEl, emptyEl, countPill, tabBadge = null, fetchPath, responseKey, idKey, cardHtml, bindEvents }){
    let knownIds = new Set();
    let firstLoad = true;

    async function fetchList(){
      try{
        const res = await fetch(`${API_BASE}${fetchPath}`, { headers: { "Authorization": `Bearer ${token}` } });
        if(res.status === 401){
          localStorage.removeItem("kst_admin_token");
          localStorage.removeItem("kst_admin");
          window.location.href = "admin-login.html";
          return;
        }
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "লোড করা যায়নি");
        render(data[responseKey] || []);
      }catch(err){
        console.error(`Failed to load ${fetchPath}:`, err.message);
      }
    }

    function render(items){
      countPill.textContent = `${items.length} পেন্ডিং`;
      if(tabBadge) tabBadge.textContent = items.length;
      emptyEl.style.display = items.length === 0 ? "block" : "none";

      const currentIds = new Set(items.map(r => r[idKey]));
      Array.from(listEl.children).forEach(card => {
        if(!currentIds.has(card.dataset.id)) removeCard(card.dataset.id);
      });

      items.forEach(item => {
        const existing = listEl.querySelector(`[data-id="${item[idKey]}"]`);
        const isNew = !firstLoad && !knownIds.has(item[idKey]);
        if(!existing){
          const wrapper = document.createElement("div");
          wrapper.innerHTML = cardHtml(item);
          const card = wrapper.firstElementChild;
          if(isNew) card.classList.add("new-highlight");
          listEl.prepend(card);
          bindEvents(card, item);
          if(isNew) setTimeout(() => card.classList.remove("new-highlight"), 2200);
        }
      });

      knownIds = currentIds;
      firstLoad = false;
    }

    function removeCard(id){
      const card = listEl.querySelector(`[data-id="${id}"]`);
      if(!card) return;
      card.classList.add("removing");
      setTimeout(() => {
        card.remove();
        if(listEl.children.length === 0) emptyEl.style.display = "block";
      }, 380);
    }

    function setCardLoading(card, loading){
      card.querySelectorAll("button").forEach(b => b.disabled = loading);
    }
    function showCardError(card, msg){
      const box = card.querySelector(".card-error");
      box.textContent = msg;
      box.classList.add("show");
    }

    fetchList();
    // No more auto-polling (setInterval removed) — the page loads the list
    // once, and after that only refreshes when the admin clicks the
    // "রিফ্রেশ" button (see refreshBtn handler below). This stops pending
    // cards from disappearing mid-review every few seconds.

    return { removeCard, setCardLoading, showCardError, fetchList };
  }

  // ================= Ad Requests section (tutor details + photo + payment together) =================
  const adreqReqList = document.getElementById("adreqReqList");
  const adreqEmptyState = document.getElementById("adreqEmptyState");
  const adreqCountPill = document.getElementById("adreqCountPill");

  function adreqCardHtml(r){
    return `
      <div class="req-card" data-id="${r.id}">
        <div class="req-top">
          <div style="display:flex;gap:12px;align-items:flex-start;">
            ${r.photo_url ? `<img class="req-photo" src="${escapeHtml(r.photo_url)}" alt="">` : ""}
            <div>
              <span class="req-name">${escapeHtml(r.name || "")}</span>
              <span class="req-role-badge bn">অ্যাড রিকুয়েস্ট</span>
              <div class="req-meta bn">${escapeHtml(r.phone || "")}</div>
            </div>
          </div>
          <span class="req-time bn">${fmtTime(r.created_at)}</span>
        </div>
        <div class="req-info-grid">
          <div class="req-info-item"><div class="k bn">সাবজেক্ট</div><div class="v">${escapeHtml(r.subject || "—")}</div></div>
          <div class="req-info-item"><div class="k bn">যোগ্যতা</div><div class="v">${escapeHtml(r.qualification || "—")}</div></div>
          <div class="req-info-item"><div class="k bn">এলাকা</div><div class="v">${escapeHtml(r.area || "—")}</div></div>
        </div>
        <div class="req-info-grid">
          <div class="req-info-item"><div class="k bn">যে নম্বর থেকে পাঠানো হয়েছে</div><div class="v mono">${escapeHtml(r.pay_sender || "—")}</div></div>
          <div class="req-info-item"><div class="k bn">ট্রানজেকশন আইডি</div><div class="v mono">${escapeHtml(r.pay_trx || "—")}</div></div>
          <div class="req-info-item"><div class="k bn">পরিমাণ</div><div class="v amount">৳${escapeHtml(r.pay_amount || "—")}</div></div>
        </div>
        <div class="req-actions">
          <button class="act-btn approve bn" data-action="approve">Approve (টাকা মিলেছে)</button>
          <button class="act-btn reject bn" data-action="reject">Reject</button>
        </div>
        <div class="reject-note-row" id="adreqRejectRow-${r.id}">
          <input type="text" placeholder="বাতিলের কারণ (ঐচ্ছিক)" id="adreqRejectNote-${r.id}">
          <button class="bn" data-action="confirm-reject">নিশ্চিত করুন</button>
        </div>
        <div class="card-error bn"></div>
      </div>
    `;
  }

  function bindAdreqEvents(card, r){
    const requestId = r.id;
    card.querySelector('[data-action="approve"]').addEventListener("click", async () => {
      adreqSection.setCardLoading(card, true);
      try{
        await callAdminAction("/api/admin/approve-ad-request", { requestId });
        adreqSection.removeCard(requestId);
      }catch(err){
        adreqSection.showCardError(card, err.message);
        adreqSection.setCardLoading(card, false);
      }
    });
    card.querySelector('[data-action="reject"]').addEventListener("click", () => {
      document.getElementById(`adreqRejectRow-${requestId}`).classList.toggle("show");
    });
    card.querySelector('[data-action="confirm-reject"]').addEventListener("click", async () => {
      const note = document.getElementById(`adreqRejectNote-${requestId}`).value.trim();
      adreqSection.setCardLoading(card, true);
      try{
        await callAdminAction("/api/admin/reject-ad-request", { requestId, note });
        adreqSection.removeCard(requestId);
      }catch(err){
        adreqSection.showCardError(card, err.message);
        adreqSection.setCardLoading(card, false);
      }
    });
  }

  const adreqSection = makeSection({
    listEl: adreqReqList, emptyEl: adreqEmptyState, countPill: adreqCountPill,
    fetchPath: "/api/admin/ad-requests", responseKey: "requests", idKey: "id",
    cardHtml: adreqCardHtml, bindEvents: bindAdreqEvents,
  });

  // ================= Manual refresh button =================
  // Only reloads the list when the admin actually clicks it — no more
  // background polling that yanks a pending card away mid-review.
  const refreshBtn = document.getElementById("refreshBtn");
  refreshBtn.addEventListener("click", async () => {
    refreshBtn.classList.add("spinning");
    refreshBtn.disabled = true;
    try{
      await adreqSection.fetchList();
    } finally {
      refreshBtn.classList.remove("spinning");
      refreshBtn.disabled = false;
    }
  });
</script>

</body>
</html>
